name: Deploy to Cloudflare Pages

# Auto-deploy the static export to Cloudflare Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: bd9760f14968ea8ab1ed1f80b6e8cb48
          command: pages deploy out --project-name=taranga-site --branch=main --commit-dirty=true
